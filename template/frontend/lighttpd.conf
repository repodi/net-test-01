server.modules = (
    "mod_access",
    "mod_alias",
    "mod_redirect"
)

server.document-root = "/var/www/lighttpd/browser"
server.upload-dirs   = ( "/tmp" )
server.errorlog      = "/var/log/lighttpd/error.log"
server.port          = 80

# Redirect root to index.html
index-file.names = ( "index.html" )

# Enable URL rewriting for Angular routing
url.rewrite-once = (
    "^/(.*)\.(html|js|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2|eot)$" => "$0",
    "^/(.*)$" => "/index.html"
)
